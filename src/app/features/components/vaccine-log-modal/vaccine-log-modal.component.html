<ion-modal [isOpen]="logData !== null" (didDismiss)="dismiss.emit()">
  <ng-template>
    @if (logData; as data) {
      <div class="p-6 relative overflow-hidden">
        <div class="absolute left-0 right-0 top-0 h-2 bg-brand-green"></div>
        <div class="flex items-start justify-between gap-4 mt-1">
          <div>
            <h3 class="text-base font-bold font-display text-brand-dark">Registrar Aplicação</h3>
            <p class="text-[11px] text-brand-dark/60 font-semibold mt-0.5">{{ data.vaccine.name }} ({{ data.dose.doseName }})</p>
          </div>
          <button (click)="dismiss.emit()"
            class="flex items-center justify-center p-1 hover:bg-neutral-100 rounded-lg text-brand-dark/40">
            <ion-icon name="close"></ion-icon>
          </button>
        </div>
        <form [formGroup]="logForm" (ngSubmit)="submit()" class="mt-4 space-y-4 text-xs font-semibold">
          <div>
            <label class="block text-xs font-bold text-brand-dark/80 mb-1">Data da Aplicação</label>
            <input type="date" formControlName="appliedDate"
              class="w-full px-3 py-2 border border-brand-dark/10 rounded-xl focus:ring-2 focus:ring-brand-green/30 focus:border-brand-green focus:outline-none bg-neutral-50/50" />
            @if (logForm.controls['appliedDate'].touched && logForm.controls['appliedDate'].invalid) {
              <span class="text-[10px] text-rose-500 font-bold block mt-0.5">Defina uma data válida.</span>
            }
          </div>
          <div>
            <label class="block text-xs font-bold text-brand-dark/80 mb-1">Local</label>
            <input type="text" formControlName="appliedPlace" placeholder="Ex: UBS Central"
              class="w-full px-3 py-2 border border-brand-dark/10 rounded-xl focus:ring-2 focus:ring-brand-green/30 focus:border-brand-green focus:outline-none bg-neutral-50/50" />
          </div>
          <div class="grid grid-cols-2 gap-3.5">
            <div>
              <label class="block text-xs font-bold text-brand-dark/80 mb-1">Lote</label>
              <input type="text" formControlName="lotNumber" placeholder="Ex: BCG443-P"
                class="w-full px-3 py-2 border border-brand-dark/10 rounded-xl focus:ring-2 focus:ring-brand-green/30 focus:border-brand-green focus:outline-none bg-neutral-50/50" />
            </div>
            <div>
              <label class="block text-xs font-bold text-brand-dark/80 mb-1">Vacinador</label>
              <input type="text" formControlName="vacinatorName" placeholder="Ex: Enfª. Sandra"
                class="w-full px-3 py-2 border border-brand-dark/10 rounded-xl focus:ring-2 focus:ring-brand-green/30 focus:border-brand-green focus:outline-none bg-neutral-50/50" />
            </div>
          </div>
          <div class="pt-4 border-t border-brand-dark/5 flex items-center justify-end gap-3">
            <button type="button" (click)="dismiss.emit()"
              class="px-4 py-2 bg-neutral-100 hover:bg-neutral-200/80 text-brand-dark font-bold rounded-xl transition">
              Cancelar
            </button>
            <button type="submit"
              class="px-5 py-2 bg-brand-green hover:bg-brand-green/90 text-white font-extrabold rounded-xl shadow-md transition">
              Salvar Registro
            </button>
          </div>
        </form>
      </div>
    }
  </ng-template>
</ion-modal>
