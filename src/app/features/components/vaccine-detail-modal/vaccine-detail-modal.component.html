<ion-modal [isOpen]="vaccine !== null" (didDismiss)="dismiss.emit()">
  <ng-template>
    @if (vaccine; as v) {
      <div class="p-6 relative overflow-hidden">
        <div class="absolute left-0 right-0 top-0 h-2 bg-gradient-to-r from-brand-green to-brand-orange"></div>
        <div class="flex items-start justify-between gap-4 mt-1.5">
          <div>
            <h3 class="text-lg font-extrabold leading-tight tracking-tight text-brand-dark font-display">{{ v.name }}</h3>
            <p class="text-xs text-brand-dark/60 font-semibold tracking-wide uppercase mt-0.5">{{ v.fullName }}</p>
          </div>
          <button (click)="dismiss.emit()"
            class="flex items-center justify-center p-1 hover:bg-neutral-100 rounded-lg text-brand-dark/40">
            <ion-icon name="close"></ion-icon>
          </button>
        </div>
        <div class="mt-5 space-y-4 text-xs font-semibold">
          <div>
            <p class="text-[10px] uppercase font-bold text-brand-dark/40 tracking-wider">Patologias Prevenidas</p>
            <p class="text-sm font-bold text-brand-green mt-0.5 flex items-center gap-1">
              <ion-icon class="text-sm leading-none" name="shield"></ion-icon>
              {{ v.diseasePrevented }}
            </p>
          </div>
          <div>
            <p class="text-[10px] uppercase font-bold text-brand-dark/40 tracking-wider">Informações Gerais</p>
            <p class="text-brand-dark/80 mt-1 leading-relaxed font-normal bg-neutral-50 p-3 rounded-xl border border-brand-dark/5">
              {{ v.description }}
            </p>
          </div>
          @if (v.sideEffects) {
            <div>
              <p class="text-[10px] uppercase font-bold text-brand-dark/40 tracking-wider">Efeitos Colaterais</p>
              <p class="text-brand-dark/70 font-medium leading-relaxed mt-1 p-3 bg-brand-orange/5 border border-brand-orange/15 rounded-xl">
                <span class="mr-1">🤒</span>
                <span>{{ v.sideEffects }}</span>
              </p>
            </div>
          }
        </div>
        <div class="mt-6 pt-4 border-t border-brand-dark/5 flex justify-end">
          <button (click)="dismiss.emit()"
            class="px-5 py-2 bg-brand-dark hover:bg-brand-dark/90 text-white font-bold text-xs rounded-xl shadow transition">
            Fechar
          </button>
        </div>
      </div>
    }
  </ng-template>
</ion-modal>
